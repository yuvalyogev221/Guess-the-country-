<!DOCTYPE html>
<html>
<head>
  <title>Guess the Country</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
    body { 
    background-color: rgba(233, 255, 219, 0.7);
    }

  .container { 
  display: flex; 
  flex-direction: column;   /* חשוב! מסדר אחד מתחת לשני */
  align-items: center; 
  }

  .earth {
  width: 80px;
  margin-top: 10px;
  }
  
  h1 {
  margin: 10px 0;
}
  
#start-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #d4f8c4, #a8e6cf);

  display: flex;
  justify-content: center;
  align-items: center;

  font-family: Arial, sans-serif;
}

.start-box {
  background: white;
  padding: 30px 25px;
  border-radius: 16px;
  width: 85%;
  max-width: 320px;
  text-align: center;

  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.start-box h2 {
  margin-bottom: 20px;
  font-size: 22px;
}

/* שדות קלט */
.start-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;

  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;

  text-align: right; /* חשוב לעברית */
}

/* כפתורים */
.start-box button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;

  border: none;
  border-radius: 8px;
  font-size: 15px;

  background: #4CAF50;
  color: white;
  cursor: pointer;

  transition: 0.2s;
}

.start-box button:hover {
  background: #43a047;
  transform: scale(1.03);
}
  
</style>
<body>
  <div id="start-screen" dir="rtl">
  <div class="start-box">
    <input type="email" id="email" placeholder="אימייל">
    <input type="text" id="password" placeholder="סיסמה">
    <button onclick="login()">התחברות</button>
    <button onclick="playAsGuest()">שחק/י כאורח/ת</button>
    <button onclick="register()">הירשם/י</button>
  </div>
</div>
  
  <header>
    <div class="container">
      <h1>GUESS THE COUNTRY</h1>
      <img src="wrld.png" class="earth">
    </div>
  </header>
  
  <script>
function playAsGuest() {
  document.getElementById("start-screen").style.display = "none";
}

function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  
  if (email === "" || password === "") {
    alert("תמלא אימייל וסיסמה");
    return;
  }

}

function register() {
  alert("register coming soon");
}
</script>
  
</body>
</html>
