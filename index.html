<!DOCTYPE html>
<html>
<head>
  <title>Guess the Country</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
    body { 
    background-color: rgba(233, 255, 219, 0.7);
    }

  .container { 
  display: flex; 
  flex-direction: column;   /* חשוב! מסדר אחד מתחת לשני */
  align-items: center; 
  }

  .earth {
  width: 80px;
  margin-top: 10px;
  }
  
  h1 {
  margin: 10px 0;
}
  
#start-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-color: rgba(0, 0, 0, 0.4); /* שקיפות! */

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 999;
}

.start-box {
  background: white;
  padding: 30px 25px;
  border-radius: 16px;
  width: 85%;
  max-width: 320px;
  text-align: center;

  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.start-box h2 {
  margin-bottom: 20px;
  font-size: 22px;
}

/* שדות קלט */
.start-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;

  border: 1px solid #ccc;
  border-radius: 8px;

  font-size: 14px;
  text-align: right;

  box-sizing: border-box; /* 🔥 זה הקסם */
}

/* כפתורים */
.start-box button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;

  border: none;
  border-radius: 8px;
  font-size: 15px;

  background: #4CAF50;
  color: white;
  cursor: pointer;

  transition: 0.2s;
}

.start-box button:hover {
  background: #43a047;
  transform: scale(1.03);
}

#guess {
  width: 80%;
  padding: 10px;
  font-size: 18px;
  text-align: right;
}

#keyboard button {
  margin: 3px;
  padding: 10px;
  font-size: 16px;
}

#suggestions div {
  background: white;
  padding: 5px;
  margin: 2px;
  cursor: pointer;
}
  
</style>
<body>
  <div id="start-screen" dir="rtl">
  <div class="start-box">

    <!-- מסך התחברות -->
    <div id="login-screen">
      <input type="email" id="email" placeholder="אימייל">
      <input type="password" id="password" placeholder="סיסמה">

      <button onclick="login()">התחברות</button>
      <button onclick="showRegister()">הירשם/י</button>
      <button onclick="playAsGuest()">שחק/י כאורח/ת</button>
    </div>

    <!-- מסך הרשמה -->
    <div id="register-screen" style="display: none;">
      <h2>הרשמה</h2>
      <input type="email" id="reg-email" placeholder="אימייל">
      <input type="password" id="reg-password" placeholder="סיסמה">
      <input type="password" id="reg-password2" placeholder="אימות סיסמה">

      <button onclick="register()">צור חשבון</button>
      <button onclick="showLogin()">חזרה להתחברות</button>
    </div>

  </div>
</div>
  
  <header>
    <div class="container">
      <h1>GUESS THE COUNTRY</h1>
      <img src="wrld.png" class="earth">
    </div>
    
    <div class="container" dir="rtl">
      <h3 onclick="showRules()" style="cursor: pointer;">החוקים📖</h3>
    </div>
    
    <input id="guess" placeholder="בחר מדינה" readonly>
<div id="suggestions"></div>

<div id="keyboard"></div>
  </header>
  
  <script>
function playAsGuest() {
  document.getElementById("start-screen").style.display = "none";
}

function showRegister() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("register-screen").style.display = "block";
}

function showLogin() {
  document.getElementById("register-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "block";
}

function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  
  if (email === "" || password === "") {
    alert("תמלא אימייל וסיסמה");
    return;
  }

  //Check the email & the password with python + sql
}

function register() {
  let email = document.getElementById("reg-email").value;
  let pass1 = document.getElementById("reg-password").value;
  let pass2 = document.getElementById("reg-password2").value;

  if (email === "" || pass1 === "" || pass2 === "") {
    alert("תמלא את כל השדות");
    return;
  }
  
  if (pass1 !== pass2) {
    alert("הסיסמאות לא תואמות");
    return;
  }

  //check if the acount is already in the DB if not put it in

  alert("נרשמת בהצלחה 🎉");
  document.getElementById("start-screen").style.display = "none";
}

  function showRules() {
    alert("החוקים: ...");
  }
  
  const countries = [
"ישראל","גרמניה","צרפת","ספרד","איטליה","פורטוגל","ברזיל","ארגנטינה","צ'ילה","מקסיקו",
"ארצות הברית","קנדה","רוסיה","אוקראינה","פולין","הולנד","בלגיה","שוויץ","אוסטריה",
"שבדיה","נורווגיה","פינלנד","דנמרק","איסלנד","יוון","טורקיה","מצרים","מרוקו","ניגריה",
"קניה","דרום אפריקה","הודו","סין","יפן","דרום קוריאה","אוסטרליה","ניו זילנד",
"סעודיה","איחוד האמירויות","איראן","עיראק","ירדן","לבנון","סוריה"
];

const letters = [
"א","ב","ג","ד","ה","ו","ז","ח","ט",
"י","כ","ל","מ","נ","ס","ע","פ","צ",
"ק","ר","ש","ת"
];

let keyboard = document.getElementById("keyboard");

letters.forEach(letter => {
  let btn = document.createElement("button");
  btn.innerText = letter;
  btn.onclick = () => addLetter(letter);
  keyboard.appendChild(btn);
});

// מחיקה
let del = document.createElement("button");
del.innerText = "⌫";
del.onclick = deleteLetter;
keyboard.appendChild(del);

// ENTER
let enter = document.createElement("button");
enter.innerText = "ENTER";
enter.onclick = submitGuess;
keyboard.appendChild(enter);

let current = "";

function addLetter(letter) {
  current += letter;
  updateInput();
  showSuggestions();
}

function deleteLetter() {
  current = current.slice(0, -1);
  updateInput();
  showSuggestions();
}

function updateInput() {
  document.getElementById("guess").value = current;
}

function submitGuess() {
  if (countries.includes(current)) {
    alert("ניחוש תקין: " + current);
  } else {
    alert("מדינה לא קיימת");
  }

  current = "";
  updateInput();
  document.getElementById("suggestions").innerHTML = "";
}

</script>
  
</body>
</html>
