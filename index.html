<!DOCTYPE html>
<html>
<head>
  <title>Guess the Country</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
    body { 
    background-color: rgba(233, 255, 219, 0.7);
    }

  .container { 
  display: flex; 
  flex-direction: column;   /* חשוב! מסדר אחד מתחת לשני */
  align-items: center; 
  }

  .earth {
  width: 80px;
  margin-top: 10px;
  }
  
  h1 {
  margin: 10px 0;
}
  
#start-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-color: rgba(0, 0, 0, 0.4); /* שקיפות! */

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 999;
}

.start-box {
  background: white;
  padding: 30px 25px;
  border-radius: 16px;
  width: 85%;
  max-width: 320px;
  text-align: center;

  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.start-box h2 {
  margin-bottom: 20px;
  font-size: 22px;
}

/* שדות קלט */
.start-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;

  border: 1px solid #ccc;
  border-radius: 8px;

  font-size: 14px;
  text-align: right;

  box-sizing: border-box; /* 🔥 זה הקסם */
}

/* כפתורים */
.start-box button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;

  border: none;
  border-radius: 8px;
  font-size: 15px;

  background: #4CAF50;
  color: white;
  cursor: pointer;

  transition: 0.2s;
}

.start-box button:hover {
  background: #43a047;
  transform: scale(1.03);
}
  
#guess {
  width: 90%;
  max-width: 400px;
  padding: 15px;
  font-size: 20px;
  border-radius: 10px;
  border: 1px solid #ccc;
  text-align: right;
}

#suggestions {
  width: 300px;
  text-align: right;
}

#suggestions div {
  padding: 8px;
  background: white;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
}

#suggestions div:hover {
  background: #eee;
}

#game-table {
  width: 95%;
  max-width: 700px;
  margin: 20px auto;

  border-collapse: separate;
  border-spacing: 0 10px;

  text-align: center;
  table-layout: fixed;
  direction: rtl;
}

/* 🔥 כותרות */
#game-table th {
  background: #f9f9f9;
  font-weight: bold;
  color: black;

  padding: 10px;
  height: 55px;

  border: 1px solid black;
}

/* 🔥 כותרות - כן יורדות שורה במקום להיחתך */
#game-table th {
  white-space: normal;
  word-break: break-word;
}

/* 🔥 שורות רגילות */
#game-table tbody tr {
  background: transparent;
}

/* 🔥 תא ראשון ואחרון יוצרים את ה"מלבן" */
#game-table td {
  padding: 10px;
  height: 55px;

  border-top: 1px solid black;
  border-bottom: 1px solid black;

  font-size: 14px;
  vertical-align: middle;

  background: transparent; /* ✅ שקוף באמת */

  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* צד ימין של השורה */
#game-table td:first-child {
  border-right: 1px solid black;
  border-top-right-radius: 12px;
  border-bottom-right-radius: 12px;
}

/* צד שמאל של השורה */
#game-table td:last-child {
  border-left: 1px solid black;
  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;
}

/* קווים בין תאים */
#game-table td + td {
  border-right: 1px solid black;
}
  
</style>
<body>
  <div id="start-screen" dir="rtl">
  <div class="start-box">

    <!-- מסך התחברות -->
    <div id="login-screen">
      <input type="email" id="email" placeholder="אימייל">
      <input type="password" id="password" placeholder="סיסמה">

      <button onclick="login()">התחברות</button>
      <button onclick="showRegister()">הירשם/י</button>
      <button onclick="playAsGuest()">שחק/י כאורח/ת</button>
    </div>

    <!-- מסך הרשמה -->
    <div id="register-screen" style="display: none;">
      <h2>הרשמה</h2>
      <input type="email" id="reg-email" placeholder="אימייל">
      <input type="password" id="reg-password" placeholder="סיסמה">
      <input type="password" id="reg-password2" placeholder="אימות סיסמה">

      <button onclick="register()">צור חשבון</button>
      <button onclick="showLogin()">חזרה להתחברות</button>
    </div>

  </div>
</div>
  
  <header>
    <div class="container">
      <h1>GUESS THE COUNTRY</h1>
      <img src="wrld.png" class="earth">
    </div>
    
    <div class="container" dir="rtl">
      <h3 onclick="showRules()" style="cursor: pointer;">החוקים📖</h3>
    </div>
    
    <div class="container" dir="rtl">
      <input id="guess" placeholder="נחש מדינה">
      <div id="suggestions"></div>
    </div>
    
    <table id="game-table">
  <tr>
    <th>מדינה</th>
    <th>אוכלוסיה</th>
    <th>שטח</th>
    <th>יבשת</th>
    <th>מטבע</th>
    <th>אזור זמן</th>
  </tr>

  <!-- 6 ניסיונות -->
  <tr>
    <td></td><td></td><td></td><td></td><td></td><td></td>
  </tr>
  <tr>
    <td></td><td></td><td></td><td></td><td></td><td></td>
  </tr>
  <tr>
    <td></td><td></td><td></td><td></td><td></td><td></td>
  </tr>
  <tr>
    <td></td><td></td><td></td><td></td><td></td><td></td>
  </tr>
  <tr>
    <td></td><td></td><td></td><td></td><td></td><td></td>
  </tr>
  <tr>
    <td></td><td></td><td></td><td></td><td></td><td></td>
  </tr>
</table>
    
  </header>
  
  <script>
function playAsGuest() {
  document.getElementById("start-screen").style.display = "none";
}

function showRegister() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("register-screen").style.display = "block";
}

function showLogin() {
  document.getElementById("register-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "block";
}

function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  
  if (email === "" || password === "") {
    alert("תמלא אימייל וסיסמה");
    return;
  }

  //Check the email & the password with python + sql
}

function register() {
  let email = document.getElementById("reg-email").value;
  let pass1 = document.getElementById("reg-password").value;
  let pass2 = document.getElementById("reg-password2").value;

  if (email === "" || pass1 === "" || pass2 === "") {
    alert("תמלא את כל השדות");
    return;
  }
  
  if (pass1 !== pass2) {
    alert("הסיסמאות לא תואמות");
    return;
  }

  //check if the acount is already in the DB if not put it in

  alert("נרשמת בהצלחה 🎉");
  document.getElementById("start-screen").style.display = "none";
}

  function showRules() {
    alert("החוקים: ...");
  }
  
  function setupAutocomplete() {
  const countries = [
"אפגניסטן","אלבניה","אלג'יריה","אנדורה","אנגולה","אנטיגואה וברבודה","ארגנטינה","ארמניה",
"אוסטרליה","אוסטריה","אזרבייג'ן","בהאמה","בחריין","בנגלדש","ברבדוס","בלארוס","בלגיה",
"בליז","בנין","בהוטן","בוליביה","בוסניה והרצגובינה","בוצואנה","ברזיל","ברוניי","בולגריה",
"בורקינה פאסו","בורונדי","קמבודיה","קמרון","קנדה","כף ורדה","הרפובליקה המרכז אפריקאית",
"צ'אד","צ'ילה","סין","קולומביה","קומורו","קונגו","קוסטה ריקה","קרואטיה","קובה","קפריסין",
"צ'כיה","דנמרק","ג'יבוטי","דומיניקה","הרפובליקה הדומיניקנית","אקוודור","מצרים","אל סלבדור",
"גינאה המשוונית","אריתריאה","אסטוניה","אתיופיה","פיג'י","פינלנד","צרפת","גבון","גמביה",
"גאורגיה","גרמניה","גאנה","יוון","גרנדה","גואטמלה","גינאה","גינאה ביסאו","גיאנה","האיטי",
"הונדורס","הונגריה","איסלנד","הודו","אינדונזיה","איראן","עיראק","אירלנד","ישראל","איטליה",
"חוף השנהב","ג'מייקה","יפן","ירדן","קזחסטן","קניה","כווית","קירגיזסטן","לאוס","לטביה",
"לבנון","ליבריה","לוב","ליכטנשטיין","ליטא","לוקסמבורג","מדגסקר","מלאווי","מלזיה",
"מלדיבים","מאלי","מלטה","מאוריטניה","מאוריציוס","מקסיקו","מולדובה","מונקו","מונגוליה",
"מונטנגרו","מרוקו","מוזמביק","מיאנמר","נמיביה","נפאל","הולנד","ניו זילנד","ניקרגואה",
"ניז'ר","ניגריה","צפון קוריאה","נורווגיה","עומאן","פקיסטן","פנמה","פרגוואי","פרו",
"פיליפינים","פולין","פורטוגל","קטאר","רומניה","רוסיה","רואנדה","סעודיה","סנגל","סרביה",
"סינגפור","סלובקיה","סלובניה","סומליה","דרום אפריקה","דרום קוריאה","ספרד","סרי לנקה",
"סודן","שוודיה","שוויץ","סוריה","טאיוואן","טנזניה","תאילנד","טורקיה","אוקראינה",
"איחוד האמירויות","בריטניה","ארצות הברית","אורוגוואי","אוזבקיסטן","ונצואלה","וייטנאם",
"תימן","זמביה","זימבבואה"
];

  let input = document.getElementById("guess");
  let box = document.getElementById("suggestions");

  input.addEventListener("input", function() {
    let value = this.value;
    box.innerHTML = "";

    if (value === "") return;

    let matches = countries.filter(c => c.startsWith(value));

    matches.forEach(c => {
      let div = document.createElement("div");
      div.innerText = c;

      div.onclick = () => {
        input.value = c;
        box.innerHTML = "";
        alert("בחרת: " + c);
      };

      box.appendChild(div);
    });
  });
  
  input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    let value = this.value;
    alert("בחרת: " + value);
  }
});
}


window.onload = function() {
  setupAutocomplete();
};

</script>
  
</body>
</html>
